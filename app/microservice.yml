apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-time-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-time
  template:
    metadata:
      labels:
        app: simple-time
    spec:
      containers:
      - name: app
        image: knikhil999/simple-time-service
        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: simple-time-service
spec:
  type: ClusterIP
  selector:
    app: simple-time
  ports:
  - port: 80
    targetPort: 5000
