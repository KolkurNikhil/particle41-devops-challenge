apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-time-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-time
  template:
    metadata:
      labels:
        app: simple-time
    spec:
      containers:
      - name: simple-time-container
        image: knikhil999/simple-time-service
        ports:
        - containerPort: 5000

        # Resource management (best practice)
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

        # Health check (important for production)
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: simple-time-service
spec:
  type: ClusterIP
  selector:
    app: simple-time
  ports:
  - port: 80
    targetPort: 5000
